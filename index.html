<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tibbe's 3D Printing Shop</title>
    <link rel="stylesheet" href="style.css">
    <meta name="description" content="Dé 3D printing shop in Brummen en omstreken! Persoonlijk, voordelig en het wordt voor je ontworpen!">
    <meta name="keywords" content="3D, 3D print, 3D printen, 3D printing, 3D printing service, op aanvraag, aanvraag, Tibbe, Snel, Tibbe Snel, Tibbe's, 3D printing company, 3D printing service, 3D printing services, online 3D printing, 3D printer service, 3D print service, 3D printed items, 3D printing online, 3D printing website, 3D printer services, 3D printing prices, order 3D prints, 3D printing price, 3D printing service online, 3D printing websites, 3D printing site, 3-D printing service, print 3D models, 3-D printing services">
    <link rel="icon" type="image/x-icon" href="Icon.png">
</head>
<body>
    <div class="container">
        <header>
            <div class="top-bar">
                <h2>Tibbe's 3D Printing Shop</h2>
            </div>
            <nav>
                <div class="menu">
                    <button onclick="changeBackground(1)">Home</button>
                    <button onclick="changeBackground(2)">Bestellen</button>
                    <button onclick="changeBackground(3)">Prijzen</button>
                    <button onclick="changeBackground(4)">Over mij</button>
                </div>
            </nav>
        </header>
        <div class="background">
        </div>
    </div>
</body>
<script>
    function changeBackground(BG) {
        if (BG == 1) {
            document.documentElement.style.setProperty('--bg-image', 'url(Homepage!.png)');
        } else if (BG == 2) {
            document.documentElement.style.setProperty('--bg-image', 'url(Orderpage.png)');
        } else if (BG == 3) {
            document.documentElement.style.setProperty('--bg-image', 'url(CleanHomepage.png)');
        } else if (BG == 4) {
            document.documentElement.style.setProperty('--bg-image', 'url(CleanHomepage.png)');
        }
    }
</script>
</html>
